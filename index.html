<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReelPatch — Learning & Build Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0e10; --bg2: #131619; --bg3: #191d21; --bg4: #20252b;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
  --text: #e6e4de; --muted: #787570; --muted2: #525050;
  --accent: #e2f04a; --accent2: #bfd130;
  --p1: #34d399; --p2: #60a5fa; --p3: #fb923c; --p4: #f472b6; --p5: #a78bfa;
  --p1bg: rgba(52,211,153,0.09); --p2bg: rgba(96,165,250,0.09);
  --p3bg: rgba(251,146,60,0.09); --p4bg: rgba(244,114,182,0.09); --p5bg: rgba(167,139,250,0.09);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;line-height:1.6;}
.app{display:flex;min-height:100vh;width:100%;}

/* SIDEBAR */
.sidebar{width:260px;min-width:260px;background:var(--bg2);border-right:1px solid var(--border);position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;flex-shrink:0;}
.logo{padding:28px 24px 22px;border-bottom:1px solid var(--border);}
.logo-mark{font-size:17px;font-weight:800;color:var(--accent);letter-spacing:-0.02em;}
.logo-sub{font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:4px;letter-spacing:0.1em;text-transform:uppercase;line-height:1.6;}
.hb-badge{display:inline-block;margin-top:10px;font-size:9px;font-family:'JetBrains Mono',monospace;padding:3px 9px;border-radius:4px;background:rgba(226,240,74,0.1);border:1px solid rgba(226,240,74,0.25);color:var(--accent2);letter-spacing:0.05em;line-height:1.6;}

.overall{padding:20px 24px;border-bottom:1px solid var(--border);}
.ov-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
.ov-pct{font-size:26px;font-weight:800;color:var(--text);letter-spacing:-0.03em;line-height:1.2;}
.ov-label{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;line-height:1.6;}
.ov-bar{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;}
.ov-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.5s cubic-bezier(.4,0,.2,1);}
.ov-sub{display:flex;justify-content:space-between;margin-top:8px;font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--muted);line-height:1.6;}

.nav{flex:1;padding:12px 0;}
.nav-item{display:flex;align-items:center;gap:11px;padding:13px 24px;cursor:pointer;border-left:2px solid transparent;transition:background 0.12s;}
.nav-item:hover{background:var(--bg3);}
.nav-item.active{background:var(--bg3);}
.ni-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.ni-body{flex:1;min-width:0;}
.ni-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.6;}
.ni-meta{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--muted);margin-top:3px;line-height:1.6;}
.ni-bar{height:2px;background:var(--bg4);border-radius:1px;margin-top:7px;}
.ni-bfill{height:100%;border-radius:1px;transition:width 0.4s;}

.sb-foot{padding:16px 24px;border-top:1px solid var(--border);}
.reset-btn{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--muted2);background:none;border:none;cursor:pointer;letter-spacing:0.05em;line-height:1.6;}
.reset-btn:hover{color:var(--muted);}

/* MAIN */
.main{flex:1;padding:40px 48px;overflow-y:auto;min-width:0;}
.main-inner{max-width:860px;}

.ph-hero{display:flex;align-items:flex-start;gap:18px;margin-bottom:32px;}
.ph-badge{width:56px;height:56px;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;}
.ph-badge-num{font-size:10px;font-family:'JetBrains Mono',monospace;font-weight:500;opacity:0.7;line-height:1.6;}
.ph-badge-icon{font-size:20px;font-weight:800;line-height:1.3;}
.ph-info{flex:1;}
.ph-title{font-size:26px;font-weight:800;letter-spacing:-0.03em;line-height:1.2;}
.ph-desc{font-size:13px;color:var(--muted);margin-top:8px;line-height:1.75;max-width:580px;}
.ph-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;}
.chip{font-size:10px;font-family:'JetBrains Mono',monospace;padding:3px 8px;border-radius:4px;border:1px solid var(--border2);color:var(--muted);line-height:1.6;}
.chip.time{border-color:rgba(226,240,74,0.3);color:var(--accent2);background:rgba(226,240,74,0.05);}
.chip.diff{border-color:rgba(96,165,250,0.3);color:#93c5fd;background:rgba(96,165,250,0.05);}

.ph-pbar{background:var(--bg3);border-radius:10px;padding:16px 20px;margin-bottom:28px;display:flex;align-items:center;gap:16px;border:1px solid var(--border);}
.ppb-txt{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--muted);min-width:90px;line-height:1.6;}
.ppb-track{flex:1;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;}
.ppb-fill{height:100%;border-radius:3px;transition:width 0.5s cubic-bezier(.4,0,.2,1);}
.ppb-num{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--muted);min-width:56px;text-align:right;line-height:1.6;}

/* deliverables */
.deliverables{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:16px 20px;margin-bottom:26px;}
.deliv-label{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px;line-height:1.6;}
.deliv-list{display:flex;flex-direction:column;gap:8px;}
.deliv-item{font-size:12px;color:var(--muted);display:flex;gap:9px;align-items:flex-start;line-height:1.7;}
.deliv-item::before{content:'→';color:var(--muted2);flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;margin-top:2px;}

/* WEEK */
.week-block{margin-bottom:10px;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.week-hdr{display:flex;align-items:center;gap:12px;padding:15px 20px;cursor:pointer;background:var(--bg2);transition:background 0.12s;user-select:none;}
.week-hdr:hover{background:var(--bg3);}
.wk-tag{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--muted);min-width:52px;letter-spacing:0.05em;line-height:1.6;}
.wk-name{flex:1;font-size:13px;font-weight:600;line-height:1.5;}
.wk-prog{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--muted);line-height:1.6;}
.wk-chev{font-size:9px;color:var(--muted2);transition:transform 0.18s;}
.wk-chev.open{transform:rotate(90deg);}
.week-body{display:none;border-top:1px solid var(--border);}
.week-body.open{display:block;}

/* learn strip */
.learn-strip{padding:13px 20px;border-bottom:1px solid var(--border);background:var(--bg);}
.ls-label{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:9px;line-height:1.6;}
.ls-tags{display:flex;flex-wrap:wrap;gap:5px;}
.ls-tag{font-size:10px;font-family:'JetBrains Mono',monospace;padding:3px 8px;border-radius:4px;background:var(--bg3);border:1px solid var(--border);color:var(--muted);line-height:1.6;}
.ls-tag.new{border-color:rgba(226,240,74,0.3);color:var(--accent2);background:rgba(226,240,74,0.06);}

/* tasks */
.task-list{background:var(--bg);}
.task-row{display:flex;align-items:flex-start;gap:13px;padding:15px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.1s;}
.task-row:last-child{border-bottom:none;}
.task-row:hover{background:var(--bg3);}
.t-check{width:19px;height:19px;border-radius:5px;border:1.5px solid var(--border2);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all 0.14s;}
.task-row.done .t-check{background:var(--accent);border-color:var(--accent);}
.t-check svg{display:none;}
.task-row.done .t-check svg{display:block;}
.t-body{flex:1;}
.t-title{font-size:13px;font-weight:600;line-height:1.55;transition:color 0.12s;}
.task-row.done .t-title{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--muted2);}
.t-desc{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.75;}
.task-row.done .t-desc{color:var(--muted2);}
.t-badges{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;}
.t-type{font-size:9px;font-family:'JetBrains Mono',monospace;padding:3px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:0.06em;line-height:1.6;}
.t-type.learn{background:rgba(226,240,74,0.1);color:var(--accent2);}
.t-type.build{background:rgba(96,165,250,0.1);color:#60a5fa;}
.t-type.setup{background:rgba(167,139,250,0.1);color:#a78bfa;}
.t-type.test {background:rgba(244,114,182,0.1);color:#f472b6;}
.t-type.ship {background:rgba(52,211,153,0.1);color:#34d399;}
.t-type.install{background:rgba(251,146,60,0.1);color:#fb923c;}

/* resources */
.res-strip{padding:11px 20px;background:var(--bg2);border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.res-lbl{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--muted2);line-height:1.6;}
.res-a{font-size:10px;font-family:'JetBrains Mono',monospace;padding:3px 8px;border-radius:4px;background:var(--bg3);border:1px solid var(--border);color:var(--muted);text-decoration:none;transition:border-color 0.12s,color 0.12s;cursor:pointer;line-height:1.6;}
.res-a:hover{border-color:var(--border2);color:var(--text);}

.ex-btn{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--muted2);cursor:pointer;padding:3px 8px;border-radius:3px;border:1px solid var(--border);background:none;user-select:none;transition:color 0.1s,border-color 0.1s;margin-top:8px;display:inline-block;line-height:1.6;}
.ex-btn:hover,.ex-btn.on{color:var(--accent2);border-color:rgba(226,240,74,0.3);background:rgba(226,240,74,0.04);}
.explain-box{display:none;margin:4px 18px 12px 49px;border-radius:8px;border:1px solid rgba(226,240,74,0.15);background:rgba(226,240,74,0.025);overflow:hidden;}
.explain-box.open{display:block;}
.ex-sec{padding:13px 15px;border-bottom:1px solid rgba(226,240,74,0.08);}
.ex-sec:last-child{border-bottom:none;}
.ex-lbl{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--accent2);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;opacity:0.75;line-height:1.6;}
.ex-txt{font-size:12px;color:var(--muted);line-height:1.8;}
.ex-txt strong{color:var(--text);font-weight:600;}
.le-list{display:flex;flex-direction:column;gap:7px;}
.le-row{display:flex;gap:10px;align-items:flex-start;}
.le-n{font-family:'JetBrains Mono',monospace;color:rgba(226,240,74,0.4);min-width:20px;text-align:right;flex-shrink:0;font-size:10px;padding-top:2px;line-height:1.6;}
.le-a{color:var(--muted2);flex-shrink:0;font-size:11px;padding-top:1px;}
.le-t{font-size:11px;color:var(--muted);line-height:1.75;}
.le-t strong{color:var(--text);}

@media(min-width:1400px){
  .main{padding:40px 60px;}
  .main-inner{max-width:1100px;}
}
@media(min-width:1800px){
  .sidebar{width:300px;min-width:300px;}
  .main{padding:44px 80px;}
  .main-inner{max-width:1300px;}
}
@media(max-width:900px){
  .main{padding:24px 28px;}
}
/* MOBILE TOPBAR + HAMBURGER DRAWER */
.mobile-bar{display:none;}
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;}
.drawer{position:fixed;top:0;left:0;height:100%;width:280px;background:var(--bg2);z-index:101;transform:translateX(-100%);transition:transform 0.25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow-y:auto;}
.drawer.open{transform:translateX(0);}
.drawer-overlay.open{display:block;}
.drawer-header{padding:20px 22px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.drawer-logo{font-size:17px;font-weight:800;color:var(--accent);letter-spacing:-0.02em;}
.drawer-close{width:32px;height:32px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:color 0.12s;}
.drawer-close:hover{color:var(--text);}
.drawer-progress{padding:14px 22px;border-bottom:1px solid var(--border);}
.drawer-pct{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-0.03em;line-height:1.2;}
.drawer-bar{height:3px;background:var(--bg4);border-radius:2px;margin:8px 0 6px;overflow:hidden;}
.drawer-bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.5s cubic-bezier(.4,0,.2,1);}
.drawer-counts{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--muted);display:flex;justify-content:space-between;line-height:1.6;}
.drawer-nav{flex:1;padding:8px 0;}
.drawer-item{display:flex;align-items:center;gap:12px;padding:13px 22px;cursor:pointer;border-left:2px solid transparent;transition:background 0.12s;}
.drawer-item:hover{background:var(--bg3);}
.drawer-item.active{background:var(--bg3);}
.drawer-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.drawer-item-body{flex:1;min-width:0;}
.drawer-item-name{font-size:13px;font-weight:600;line-height:1.5;}
.drawer-item-meta{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--muted);margin-top:2px;line-height:1.5;}
.drawer-item-bar{height:2px;background:var(--bg4);border-radius:1px;margin-top:6px;}
.drawer-item-fill{height:100%;border-radius:1px;transition:width 0.4s;}
.drawer-foot{padding:14px 22px;border-top:1px solid var(--border);}
.drawer-reset{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--muted2);background:none;border:none;cursor:pointer;letter-spacing:0.05em;line-height:1.6;}

@media(max-width:680px){
  .sidebar{display:none;}
  .mobile-bar{display:flex;align-items:center;gap:10px;padding:14px 16px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;}
  .mob-logo{font-size:15px;font-weight:800;color:var(--accent);letter-spacing:-0.02em;flex-shrink:0;}
  .mob-center{flex:1;min-width:0;display:flex;flex-direction:column;align-items:flex-end;padding-right:4px;}
  .mob-phase{font-size:11px;font-weight:600;color:var(--muted);line-height:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;}
  .mob-progress{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--muted2);line-height:1.5;}
  .mob-hamburger{width:36px;height:36px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;flex-shrink:0;margin-left:auto;}
  .mob-hamburger span{display:block;width:18px;height:1.5px;background:var(--text);border-radius:1px;}
  .app{flex-direction:column;}
  .main{padding:16px;}
  .main-inner{max-width:100%;}
}

.t-code-wrap{margin-top:10px;border-radius:7px;overflow:hidden;border:1px solid var(--border2);}
.t-code-hdr{background:var(--bg4);padding:5px 13px;}
.t-code-lang{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;line-height:1.6;}
.t-code-body{background:#0a0c0f;padding:12px 15px;overflow-x:auto;}
.t-code-body code{font-family:'JetBrains Mono',monospace;font-size:11px;color:#93c5fd;line-height:1.8;white-space:pre;}
.t-explain{background:rgba(226,240,74,0.04);border-left:2px solid rgba(226,240,74,0.3);padding:11px 15px;}
.t-explain-only{margin-top:10px;border-radius:7px;overflow:hidden;border:1px solid var(--border);}
.t-explain-lbl{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--accent2);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:7px;line-height:1.6;}
.t-explain-txt{font-size:12px;color:#aeaca4;line-height:1.8;}
.t-explain-txt strong{color:var(--text);font-weight:500;}
</style>
</head>
<body>
<div class="app">

<!-- Mobile top bar -->
<div class="mobile-bar">
  <span class="mob-logo">ReelPatch</span>
  <div class="mob-center">
    <span class="mob-phase" id="mob-phase">01 — Bare Minimum MVP</span>
    <span class="mob-progress" id="mob-progress">0%</span>
  </div>
  <div class="mob-hamburger" onclick="openDrawer()" aria-label="Open menu">
    <span></span><span></span><span></span>
  </div>
</div>

<!-- Drawer overlay + panel -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <span class="drawer-logo">ReelPatch</span>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-progress">
    <div class="drawer-pct" id="drawer-pct">0%</div>
    <div class="drawer-bar"><div class="drawer-bar-fill" id="drawer-bar" style="width:0%"></div></div>
    <div class="drawer-counts"><span id="drawer-done">0 done</span><span id="drawer-total">— tasks</span></div>
  </div>
  <div class="drawer-nav" id="drawer-nav"></div>
  <div class="drawer-foot"><button class="drawer-reset" onclick="confirmReset()">↺ reset all progress</button></div>
</div>

<nav class="sidebar">
  <div class="logo">
    <div class="logo-mark">ReelPatch</div>
    <div class="logo-sub">Learning &amp; Build Tracker</div>
    <div class="hb-badge">Dhruv's side project</div>
  </div>
  <div class="overall">
    <div class="ov-row"><span class="ov-pct" id="ov-pct">0%</span><span class="ov-label">complete</span></div>
    <div class="ov-bar"><div class="ov-fill" id="ov-bar" style="width:0%"></div></div>
    <div class="ov-sub"><span id="ov-done">0 done</span><span id="ov-total">— tasks</span></div>
  </div>
  <div class="nav" id="nav"></div>
  <div class="sb-foot"><button class="reset-btn" onclick="confirmReset()">↺ reset all progress</button></div>
</nav>

<main class="main" id="main"><p style="color:var(--muted);font-size:13px;padding:40px;">Loading…</p></main>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>

const PHASES = [
{
  id:'p1',color:'#34d399',bg:'rgba(52,211,153,0.1)',
  num:'01',name:'Bare Minimum MVP',
  desc:'Build the working skeleton — video upload, FFmpeg metadata, platform selector, and a placeholder results page. By the end you can demo the pipeline end-to-end.',
  time:'4-6 hrs build / ~3 weeks learn+build',diff:'Beginner-Intermediate',
  deliverables:[
    'Working React frontend with drag-and-drop upload',
    'FastAPI backend receiving and storing video files',
    'FFmpeg metadata extraction returning real video data',
    'Platform dropdown wired to backend',
    'Results page with metadata + placeholder badge',
  ],
  weeks:[
    {
      tag:'Week 1',name:'Mac setup + Python environment',
      concepts:['Homebrew','virtual environments','pip','project structure','git','.env files'],
      newConcepts:['Homebrew','virtual environments','pip','git','.env files'],
      resources:[
        {label:'Homebrew',url:'https://brew.sh'},
        {label:'Real Python venvs',url:'https://realpython.com/python-virtual-environments-a-primer/'},
        {label:'Git book',url:'https://git-scm.com/book/en/v2'},
      ],
      tasks:[
        {
          type:'setup',
          title:'Install Homebrew — the Mac package manager',
          desc:'Open Terminal (Cmd+Space, type Terminal). Paste this and press Enter. Homebrew lets you install developer tools with one command instead of downloading .dmg files.',
          code:'/bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"',
          explain:'<strong>curl -fsSL URL</strong> downloads the install script silently (-s) and follows redirects (-L). <strong>/bin/bash -c</strong> runs the downloaded script immediately. The <strong>$(...)</strong> syntax means: run the curl command first, then use its output as the argument to bash. After this runs you will have the <strong>brew</strong> command available in every new terminal window.',
        },
        {
          type:'setup',
          title:'Install Python, git, and ffmpeg in one line',
          desc:'Three essential tools for the whole project. Run this after Homebrew installs.',

          code:'// In App.jsx:\nconst [decisions, setDecisions] = useState({})\n// { "uuid-1": "accepted", "uuid-2": "dismissed", ... }\n\nfunction decide(id, decision) {\n  setDecisions(prev => ({ ...prev, [id]: decision }))\n}\n\n// In ViolationCard:\n<button onClick={() => decide(v.id, "accepted")}\n  className={decisions[v.id]==="accepted" ? "bg-green-500" : "bg-gray-700"}>\n  Accept\n</button>\n<button onClick={() => decide(v.id, "dismissed")}\n  className={decisions[v.id]==="dismissed" ? "bg-gray-500" : "bg-gray-700"}>\n  Dismiss\n</button>',
          explain:'<strong>decisions</strong> is an object (not an array) — keyed by violation ID for O(1) lookup. <strong>setDecisions(prev => ({...prev, [id]: decision}))</strong> — this is the React pattern for updating one key in an object state. The spread <strong>...prev</strong> copies all existing decisions, then <strong>[id]: decision</strong> adds or overwrites just the one you changed. Square brackets around id make it a computed key — the variable\'s value becomes the key name. The button style changes based on whether decisions[v.id] matches its type.',

          type:'build',
          title:'Add bulk actions — Dismiss all of a type at once',
          desc:'Buttons above the timeline: Dismiss all violence, Dismiss all NSFW, etc.',
          code:'function dismissAllOfType(type) {\n  const updates = {}\n  violations\n    .filter(v => v.type === type)\n    .forEach(v => { updates[v.id] = "dismissed" })\n  setDecisions(prev => ({ ...prev, ...updates }))\n}',
          explain:'<strong>violations.filter(v => v.type === type)</strong> gets all violations of that type. <strong>.forEach(v => updates[v.id] = "dismissed")</strong> builds a batch update object. <strong>setDecisions(prev => ({...prev, ...updates}))</strong> — spreading ...updates at the end means its keys overwrite any existing ones. This is an atomic update: one state change that updates all matching violations simultaneously, avoiding the multiple-render problem you get from calling setDecisions in a loop.',
        },
        {
          type:'build',
          title:'Add a review summary bar — accepted / dismissed / pending counts',
          desc:'A sticky bar showing live counts that update as the user reviews violations.',
          code:'const accepted  = violations.filter(v => decisions[v.id]==="accepted").length\nconst dismissed = violations.filter(v => decisions[v.id]==="dismissed").length\nconst pending   = violations.length - accepted - dismissed\n\n<div className="flex gap-6 p-3 bg-gray-900">\n  <span className="text-green-400">{accepted} accepted</span>\n  <span className="text-gray-400">{dismissed} dismissed</span>\n  <span className="text-yellow-400">{pending} pending</span>\n</div>',
          explain:'These three values are <strong>derived state</strong> — computed from existing state rather than stored separately. Never store counts as separate state variables that you manually increment — they get out of sync. Instead, compute them from the source of truth (decisions object) every render. React re-renders are fast and these filter operations on a few dozen violations take microseconds. <strong>violations.length - accepted - dismissed</strong> — subtraction is cheaper than a third filter call.',
        },

          explain:'<strong>defaults write</strong> is a macOS command that writes to the system preferences database. <strong>com.adobe.CSXS.11</strong> is Adobe\'s preference domain for their extension system. <strong>PlayerDebugMode 1</strong> disables the signature verification check. Without this, Premiere refuses to load any extension that isn\'t signed with an Adobe certificate (which costs money). The 11 is the CSXS version number — if you are on a very new Premiere version, try 12 or 13.',

const _db  = firebase.firestore();
const _ref = _db.collection('tracker').doc('dhruv');

async function loadProgress() {
  try {
    const snap = await _ref.get();
    if (snap.exists) {
      const data = snap.data().progress || {};
      localStorage.setItem('rp_progress', JSON.stringify(data));
      return data;
    }
  } catch(e) { console.warn('Firebase load failed, using localStorage fallback'); }
  try { const r = localStorage.getItem('rp_progress'); return r ? JSON.parse(r) : {}; } catch { return {}; }
}

let _saveTimer = null;
function saveProgress(p) {
  try { localStorage.setItem('rp_progress', JSON.stringify(p)); } catch {}
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async () => {
    try { await _ref.set({ progress: p }); }
    catch(e) { console.warn('Firebase save failed, localStorage backup active'); }
  }, 800);
}

function counts(phId){const ph=PHASES.find(p=>p.id===phId);let d=0,t=0;for(const w of ph.weeks)for(const tk of w.tasks){t++;if(progress[key(phId,w,tk)])d++;}return{d,t};}
function key(phId,wk,tk){return`${phId}||${wk.tag}||${tk.title}`;}
function allCounts(){let d=0,t=0;for(const ph of PHASES){const c=counts(ph.id);d+=c.d;t+=c.t;}return{d,t};}

function openDrawer(){
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
  document.body.style.overflow='';
}

function renderNav(){
  const nav=document.getElementById('nav');
  const drawerNav=document.getElementById('drawer-nav');
  nav.innerHTML='';
  if(drawerNav) drawerNav.innerHTML='';
  PHASES.forEach(ph=>{
    const{d,t}=counts(ph.id);
    const pct=t?Math.round(d/t*100):0;
    const isActive=ph.id===currentPhase;
    const innerHtml=`<div class="ni-dot" style="background:${ph.color}"></div>
    <div class="ni-body">
      <div class="ni-name" style="color:${isActive?ph.color:'var(--text)'}">${ph.num} — ${ph.name}</div>
      <div class="ni-meta">${d}/${t} · ${pct}%</div>
      <div class="ni-bar"><div class="ni-bfill" style="width:${pct}%;background:${ph.color}"></div></div>
    </div>`;
    // Sidebar nav item
    const el=document.createElement('div');
    el.className='nav-item'+(isActive?' active':'');
    el.style.borderLeftColor=isActive?ph.color:'transparent';
    el.innerHTML=innerHtml;
    el.onclick=()=>{currentPhase=ph.id;renderNav();renderMain();document.getElementById('main').scrollTop=0;};
    nav.appendChild(el);
    // Drawer nav item
    if(drawerNav){
      const del=document.createElement('div');
      del.className='drawer-item'+(isActive?' active':'');
      del.style.borderLeftColor=isActive?ph.color:'transparent';
      del.innerHTML=`<div class="drawer-dot" style="background:${ph.color}"></div>
      <div class="drawer-item-body">
        <div class="drawer-item-name" style="color:${isActive?ph.color:'var(--text)'}">${ph.num} — ${ph.name}</div>
        <div class="drawer-item-meta">${d}/${t} · ${pct}%</div>
        <div class="drawer-item-bar"><div class="drawer-item-fill" style="width:${pct}%;background:${ph.color}"></div></div>
      </div>`;
      del.onclick=()=>{currentPhase=ph.id;closeDrawer();renderNav();renderMain();window.scrollTo(0,0);};
      drawerNav.appendChild(del);
    }
  });
  // Update mobile bar current phase label
  const mobPhase=document.getElementById('mob-phase');
  if(mobPhase){
    const cur=PHASES.find(p=>p.id===currentPhase);
    mobPhase.textContent=cur.num+' — '+cur.name;
  }
}

function updateOverall(){
  const{d,t}=allCounts();
  const pct=t?Math.round(d/t*100):0;
  document.getElementById('ov-pct').textContent=pct+'%';
  document.getElementById('ov-bar').style.width=pct+'%';
  document.getElementById('ov-done').textContent=d+' done';
  document.getElementById('ov-total').textContent=t+' tasks';
  // Update drawer
  const dp=document.getElementById('drawer-pct');
  const db=document.getElementById('drawer-bar');
  const dd=document.getElementById('drawer-done');
  const dt=document.getElementById('drawer-total');
  const mp=document.getElementById('mob-progress');
  if(dp) dp.textContent=pct+'%';
  if(db) db.style.width=pct+'%';
  if(dd) dd.textContent=d+' done';
  if(dt) dt.textContent=t+' tasks';
  if(mp) mp.textContent=pct+'%';
}

function renderMain(){
  const ph=PHASES.find(p=>p.id===currentPhase);
  const{d,t}=counts(ph.id);
  const pct=t?Math.round(d/t*100):0;

  let html=`<div class="ph-hero">
    <div class="ph-badge" style="background:${ph.bg}">
      <span class="ph-badge-num">${ph.num}</span>
      <span class="ph-badge-icon" style="color:${ph.color}">◈</span>
    </div>
    <div class="ph-info">
      <div class="ph-title">${ph.name}</div>
      <div class="ph-desc">${ph.desc}</div>
      <div class="ph-chips">
        <span class="chip time">${ph.time}</span>
        <span class="chip diff">${ph.diff}</span>
      </div>
    </div>
  </div>
  <div class="ph-pbar">
    <span class="ppb-txt">Phase progress</span>
    <div class="ppb-track"><div class="ppb-fill" id="ph-bar" style="width:${pct}%;background:${ph.color}"></div></div>
    <span class="ppb-num" id="ph-count">${d} / ${t}</span>
  </div>
  <div class="deliverables">
    <div class="deliv-label">Phase deliverables</div>
    <div class="deliv-list">${ph.deliverables.map(d=>`<div class="deliv-item">${d}</div>`).join('')}</div>
  </div>`;

  ph.weeks.forEach((wk,wi)=>{
    const wkDone=wk.tasks.filter(tk=>progress[key(ph.id,wk,tk)]).length;
    const learnTags=wk.concepts.map(c=>`<span class="ls-tag${wk.newConcepts&&wk.newConcepts.includes(c)?' new':''}">${c}</span>`).join('');
    const taskHtml=wk.tasks.map((tk,ti)=>{
      const k=key(ph.id,wk,tk);
      const done=progress[k]?' done':'';
      const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
      const exHtml = tk.explain ? '<div class="t-explain"><div class="t-explain-lbl">what\'s happening here</div><div class="t-explain-txt">'+tk.explain+'</div></div>' : '';
      const codeHtml = tk.code
        ? '<div class="t-code-wrap"><div class="t-code-hdr"><span class="t-code-lang">code / command</span></div><div class="t-code-body"><code>'+esc(tk.code)+'</code></div>'+exHtml+'</div>'
        : (exHtml ? '<div class="t-explain-only">'+exHtml+'</div>' : '');
      return`<div class="task-row${done}" id="tr-${ph.id}-${wi}-${ti}" onclick="toggleTask('${ph.id}',${wi},${ti})">
        <div class="t-check"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="#0c0e10" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="t-body">
          <div class="t-title">${tk.title}</div>
          <div class="t-desc">${tk.desc}</div>
          ${codeHtml}
          <div class="t-badges"><span class="t-type ${tk.type}">${tk.type}</span></div>
        </div>
      </div>`;
    }).join('');
    const resHtml=wk.resources&&wk.resources.length?`<div class="res-strip"><span class="res-lbl">learn →</span>${wk.resources.map(r=>`<a class="res-a" href="${r.url}" target="_blank">${r.label}</a>`).join('')}</div>`:'';

    html+=`<div class="week-block">
      <div class="week-hdr" onclick="toggleWeek('${ph.id}',${wi})">
        <span class="wk-tag">${wk.tag}</span>
        <span class="wk-name">${wk.name}</span>
        <span class="wk-prog" id="wp-${ph.id}-${wi}">${wkDone}/${wk.tasks.length}</span>
        <span class="wk-chev" id="wc-${ph.id}-${wi}">▶</span>
      </div>
      <div class="week-body" id="wb-${ph.id}-${wi}">
        <div class="learn-strip">
          <div class="ls-label">concepts this week <span style="color:var(--accent2);margin-left:6px;">★ = new to you</span></div>
          <div class="ls-tags">${learnTags}</div>
        </div>
        <div class="task-list">${taskHtml}</div>
        ${resHtml}
      </div>
    </div>`;
  });
  document.getElementById('main').innerHTML='<div class="main-inner">'+html+'</div>';
}

const _openEx=new Set();
function toggleEx(e,eid){
  e.stopPropagation();
  const box=document.getElementById(eid);
  const btn=document.getElementById('exbtn-'+eid);
  if(_openEx.has(eid)){_openEx.delete(eid);box.classList.remove('open');btn.classList.remove('on');}
  else{_openEx.add(eid);box.classList.add('open');btn.classList.add('on');}
}
function toggleWeek(phId,wi){
  const b=document.getElementById(`wb-${phId}-${wi}`);
  const c=document.getElementById(`wc-${phId}-${wi}`);
  b.classList.toggle('open');c.classList.toggle('open');
}

function toggleTask(phId,wi,ti){
  const ph=PHASES.find(p=>p.id===phId);
  const wk=ph.weeks[wi];const tk=wk.tasks[ti];
  const k=key(phId,wk,tk);
  progress[k]=!progress[k];
  saveProgress(progress);
  const el=document.getElementById(`tr-${phId}-${wi}-${ti}`);
  if(progress[k])el.classList.add('done');else el.classList.remove('done');
  const wkDone=wk.tasks.filter(t2=>progress[key(phId,wk,t2)]).length;
  document.getElementById(`wp-${phId}-${wi}`).textContent=`${wkDone}/${wk.tasks.length}`;
  const{d,t}=counts(phId);
  const pct=t?Math.round(d/t*100):0;
  document.getElementById('ph-bar').style.width=pct+'%';
  document.getElementById('ph-count').textContent=`${d} / ${t}`;
  renderNav();updateOverall();
}

async function confirmReset(){
  if(confirm('Reset all progress?')){progress={};saveProgress(progress);renderNav();renderMain();updateOverall();}
}

async function init(){progress=await loadProgress();renderNav();renderMain();updateOverall();}
init();
